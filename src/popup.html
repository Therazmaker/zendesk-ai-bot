<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zendesk AI Chatbot</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Zendesk AI Bot</h1>
            <button id="settingsBtn" class="settings-btn">⚙️</button>
        </div>

        <!-- Settings Panel -->
        <div id="settingsPanel" class="settings-panel hidden">
            <div class="settings-content">
                <h2>Configuración</h2>
                <label>Zendesk API Key:</label>
                <input type="password" id="apiKeyInput" placeholder="Tu API Key de Zendesk">
                
                <label>Email de Zendesk:</label>
                <input type="email" id="emailInput" placeholder="tu-email@ejemplo.com">
                
                <label>Zendesk Subdomain:</label>
                <input type="text" id="subdomainInput" placeholder="tu-subdomain">
                
                <button id="downloadChatsBtn" class="btn-primary">Descargar 100 Chats</button>
                <div id="downloadStatus" class="status-message"></div>
                
                <button id="closeSettingsBtn" class="btn-secondary">Cerrar</button>
            </div>
        </div>

        <!-- Chat Interface -->
        <div id="chatInterface" class="chat-interface">
            <div id="chatHistory" class="chat-history"></div>
            
            <div class="input-area">
                <textarea id="userInput" placeholder="Escribe tu pregunta..." rows="3"></textarea>
                <button id="sendBtn" class="btn-send">Enviar</button>
            </div>
        </div>

        <!-- Bot Response Panel -->
        <div id="responsePanel" class="response-panel hidden">
            <h3>Respuesta Sugerida:</h3>
            <div id="botResponse" class="bot-response-text"></div>
            <div class="response-actions">
                <button id="approveBtn" class="btn-approve">✓ Aprobar</button>
                <button id="rejectBtn" class="btn-reject">✗ Rechazar</button>
                <button id="editBtn" class="btn-edit">✎ Editar</button>
            </div>
        </div>

        <!-- Training Status -->
        <div class="training-status">
            <small id="trainingInfo">Chats cargados: 0 | Modelo entrenado</small>
        </div>
    </div>

    <script src="../lib/tf.min.js"></script>
    <script src="popup.js"></script>
</body>
</html>
