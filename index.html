<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Living Neural Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-void: #060608;
      --bg-deep: #0c0c10;
      --bg-surface: #13131a;
      --bg-lift: #1a1a24;
      --neuron-gen1: #1DB584;
      --neuron-gen2: #7B6FE8;
      --neuron-gen3: #E8A020;
      --signal-buy: #00E5A0;
      --signal-sell: #FF4757;
      --signal-wait: #5A5A7A;
      --conn-active: rgba(29,181,132,0.35);
      --conn-dormant: rgba(255,255,255,0.04);
      --conn-firing: rgba(0,229,160,0.7);
      --text-primary: #dddbd4;
      --text-secondary: #7a7870;
      --text-tertiary: #3a3835;
      --text-narrative: #c8f0e0;
      --border-faint: rgba(255,255,255,0.04);
      --border-subtle: rgba(255,255,255,0.08);
      --border-medium: rgba(255,255,255,0.15);
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg-void); color: var(--text-primary); font-family: 'Space Grotesk', sans-serif; }
    .mono, .narrative, .log, canvas, .text-stat, input, textarea, select { font-family: 'Space Mono', monospace; }
    .text-label { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-tertiary); }
    .text-sm { font-size: 12px; color: var(--text-secondary); }
    .text-base { font-size: 14px; color: var(--text-primary); }
    .text-lg { font-size: 18px; font-weight: 600; }
    .text-stat { font-size: 26px; font-weight: 700; }

    .app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
    .graph-col { border-right: 1px solid var(--border-faint); background: var(--bg-void); position: relative; }
    #brainCanvas { width: 100%; height: 100vh; display: block; }
    .tooltip { position: absolute; pointer-events: none; background: var(--bg-lift); border: 1px solid var(--border-subtle); padding: 8px; border-radius: 6px; font-size: 11px; opacity: 0; transform: translate(-50%, -120%); white-space: nowrap; }
    .weight-mini { width: 120px; height: 4px; border-radius: 3px; background: var(--border-faint); margin-top: 4px; overflow: hidden; }
    .weight-mini > span { display: block; height: 100%; background: var(--neuron-gen1); }

    .main-col { display: flex; flex-direction: column; }
    header { height: 68px; border-bottom: 1px solid var(--border-faint); background: var(--bg-deep); display: flex; align-items: center; justify-content: space-between; padding: 0 18px; }
    .stats { display: flex; gap: 12px; }
    .stat { padding: 6px 10px; border: 1px solid var(--border-faint); border-radius: 8px; background: var(--bg-surface); }

    .tabs { display: flex; gap: 8px; padding: 10px 18px; border-bottom: 1px solid var(--border-faint); }
    .tab { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; padding: 8px 12px; border: 1px solid var(--border-faint); border-radius: 8px; color: var(--text-secondary); cursor: pointer; }
    .tab.active { color: var(--text-primary); border-color: var(--border-medium); background: var(--bg-surface); }

    .panel-wrap { padding: 16px 18px 22px; }
    .panel { display: none; background: var(--bg-deep); border: 1px solid var(--border-faint); border-radius: 12px; padding: 16px; }
    .panel.active { display: block; animation: panelIn .2s ease-out; }
    @keyframes panelIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .tx-area { width: 100%; min-height: 120px; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 8px; color: var(--text-primary); font-size: 12px; line-height: 1.7; padding: 12px 16px; resize: vertical; outline: none; transition: border-color .15s; }
    .tx-area:focus { border-color: var(--border-medium); }
    .tx-area::placeholder { color: var(--text-tertiary); }

    .rule-row, .observe-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 8px; }
    .candle-form { display: grid; grid-template-columns: repeat(5, 1fr) auto; gap: 8px; align-items: end; }
    .field-group label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-tertiary); display:block; margin-bottom: 4px; }
    .field-group input, .field-group select { width: 100%; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 6px; color: var(--text-primary); font-size: 13px; padding: 7px 10px; outline: none; }
    .field-group input:focus, .field-group select:focus { border-color: var(--neuron-gen1); }

    .btn-primary { background: var(--neuron-gen1); color: #000; font-weight: 700; font-family: 'Space Grotesk'; font-size: 13px; padding: 9px 20px; border: none; border-radius: 6px; cursor: pointer; letter-spacing: .04em; }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-ghost { background: transparent; color: var(--text-secondary); font-size: 13px; padding: 9px 20px; border: 1px solid var(--border-subtle); border-radius: 6px; cursor: pointer; }
    .btn-ghost:hover { border-color: var(--border-medium); color: var(--text-primary); background: var(--bg-lift); }
    .btn-warning { background: rgba(255, 71, 87, 0.15); color: #ff9ca5; border-color: rgba(255, 71, 87, 0.35); }
    .btn-warning:hover { background: rgba(255, 71, 87, 0.25); color: #ffd6da; border-color: rgba(255, 71, 87, 0.55); }
    .mode-controls { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .mode-btn { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-subtle); border-radius: 999px; padding: 7px 12px; font-size: 12px; cursor: pointer; }
    .mode-btn.active { background: rgba(29, 181, 132, 0.2); color: var(--text-primary); border-color: rgba(29, 181, 132, 0.6); }

    .health-grid { display:grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap:8px; margin-top:10px; }
    .health-card { padding:10px; border:1px solid var(--border-faint); border-radius:8px; background: var(--bg-surface); }

    .narrative-panel { background: var(--bg-deep); border: 1px solid var(--border-faint); border-radius: 12px; padding: 20px 24px; min-height: 180px; position: relative; overflow: hidden; }
    .narrative-panel::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px); pointer-events:none; }
    .narrative-history { opacity: .3; font-size: 11px; color: var(--text-secondary); margin-bottom: 12px; border-bottom: 1px solid var(--border-faint); padding-bottom: 10px; }
    .narrative-text { font-size: 13px; line-height: 1.9; color: var(--text-narrative); white-space: pre-wrap; position: relative; z-index: 1; }
    .narrative-cursor { display: inline-block; width: 8px; height: 14px; background: var(--signal-buy); animation: blink .8s step-end infinite; vertical-align: text-bottom; margin-left: 2px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .signal-badge { display: inline-flex; align-items:center; gap:8px; padding: 10px 20px; border-radius: 8px; font-size:15px; font-weight:700; letter-spacing:.06em; position:relative; overflow:hidden; }
    .signal-badge.buy { background: rgba(0,229,160,.1); color: var(--signal-buy); border: 1px solid rgba(0,229,160,.3); box-shadow: 0 0 20px rgba(0,229,160,.15), inset 0 0 20px rgba(0,229,160,.05); }
    .signal-badge.sell { background: rgba(255,71,87,.1); color: var(--signal-sell); border: 1px solid rgba(255,71,87,.3); box-shadow: 0 0 20px rgba(255,71,87,.15), inset 0 0 20px rgba(255,71,87,.05); }
    .signal-badge.wait { background: rgba(90,90,122,.12); color: var(--signal-wait); border: 1px solid rgba(90,90,122,.3); }
    .confidence-fill { position:absolute; left:0; top:0; bottom:0; background: currentColor; opacity:.06; transition: width .6s cubic-bezier(.34,1.56,.64,1); }

    .neuron-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:8px; border:1px solid var(--border-faint); margin-bottom:6px; background: var(--bg-surface); }
    .neuron-item:hover { border-color: var(--border-subtle); background: var(--bg-lift); }
    .neuron-orb { width:10px; height:10px; border-radius:50%; flex-shrink:0; box-shadow: 0 0 8px currentColor; }
    .weight-bar { height:3px; background: var(--border-faint); border-radius:2px; flex:1; }
    .weight-fill { height:100%; border-radius:2px; background: var(--neuron-gen1); transition: width .4s ease; }
    .log { max-height: 230px; overflow: auto; border:1px solid var(--border-faint); background: var(--bg-surface); border-radius: 8px; padding: 10px; font-size: 11px; }
    .log-line { animation: logIn .15s ease-out; margin-bottom: 4px; }
    @keyframes logIn { from { opacity:0; transform:translateX(-6px); } to { opacity:1; transform:translateX(0); } }
  </style>
</head>
<body>
<div class="app">
  <aside class="graph-col">
    <canvas id="brainCanvas"></canvas>
    <div class="tooltip" id="tooltip"></div>
  </aside>
  <section class="main-col">
    <header>
      <div>
        <div class="text-lg">Living Brain</div>
        <div class="text-sm">Sistema Neuronal Vivo para Trading Binario</div>
      </div>
      <div class="stats">
        <div class="stat"><div class="text-label">Neuronas</div><div class="text-stat" id="statNeurons">0</div></div>
        <div class="stat"><div class="text-label">Gen</div><div class="text-stat" id="statGen">1</div></div>
        <div class="stat"><div class="text-label">Velas vistas</div><div class="text-stat" id="statObs">0</div></div>
        <div class="stat"><div class="text-label">Salud cerebro</div><div class="text-stat" id="statHealth">0%</div></div>
        <button class="btn-ghost" id="btnSurvivalReport">Ver Reporte Detallado</button>
        <button class="btn-ghost" id="btnExportPro">📥 Exportar Patrones Pro</button>
        <button class="btn-ghost btn-warning" id="btnPruneNoise">🧹 Purgar Ruido</button>
      </div>
      <div class="text-sm" id="testModeHint">Modo actual: —</div>
    </header>

    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="teach">Enseñar</button>
      <button class="tab" data-tab="observe">Observar velas</button>
      <button class="tab" data-tab="narrative">Narración en vivo</button>
      <button class="tab" data-tab="neurons">Neuronas</button>
    </nav>

    <main class="panel-wrap">
      <section class="panel active" id="panel-teach">
        <div class="text-label">Transcripción de video</div>
        <textarea class="tx-area" id="transcript" placeholder="Pega transcripción..."></textarea>
        <div style="margin-top:10px; display:flex; gap:8px;"><button class="btn-primary" id="btnTranscript">Aprender de transcripción</button></div>

        <div class="text-label" style="margin-top:14px;">Regla manual</div>
        <div class="rule-row">
          <input id="ruleInput" class="tx-area" style="min-height:42px" placeholder="Pin bar en soporte con RSI menor a 35 es BUY" />
          <button class="btn-primary" id="btnRule">Añadir regla</button>
          <button class="btn-ghost" id="btnEvolve">Evolucionar neuronas</button>
        </div>

        <div class="text-label" style="margin-top:14px;">Vela histórica + resultado</div>
        <form class="candle-form" id="trainForm">
          <div class="field-group"><label>Open</label><input type="number" step="0.01" name="open" value="100" /></div>
          <div class="field-group"><label>High</label><input type="number" step="0.01" name="high" value="104" /></div>
          <div class="field-group"><label>Low</label><input type="number" step="0.01" name="low" value="98" /></div>
          <div class="field-group"><label>Close</label><input type="number" step="0.01" name="close" value="101" /></div>
          <div class="field-group"><label>RSI</label><input type="number" step="0.1" name="rsi" value="34" /></div>
          <div class="field-group"><label>Outcome</label><select name="outcome"><option>WIN</option><option>LOSS</option></select></div>
        </form>
        <div style="margin-top:8px;"><button class="btn-primary" id="btnCandle">Aprender de vela</button></div>
        <div style="margin-top:10px; display:flex; gap:8px; align-items:center;">
          <button class="btn-ghost" id="btnExportProPanel">📥 Exportar Patrones Pro</button>
        </div>
        <textarea class="tx-area" id="exportOutput" readonly style="margin-top:8px; min-height:110px;" placeholder="Aquí aparecerá el JSON exportado de patrones y reglas élite."></textarea>


        <div class="text-label" style="margin-top:14px;">Carga de Datos</div>
        <div style="display:flex; gap:8px; align-items:center;">
          <input type="file" id="dataFile" accept=".csv,.json" class="tx-area" style="min-height:42px; padding:8px 10px;" />
          <div class="mode-controls" id="phaseTriggers">
            <button class="mode-btn" data-phase="discovery">▶ Fase 1: Descubrimiento</button>
            <button class="mode-btn" data-phase="validation">🛡️ Fase 2: Validación</button>
            <button class="mode-btn" data-phase="selection">⚔️ Fase 3: Selección Radical</button>
          </div>
        </div>

        <div class="text-label" style="margin-top:14px;">Monitor de Salud</div>
        <div class="health-grid">
          <div class="health-card"><div class="text-label">Neuronas Vivas</div><div class="text-base" id="healthAlive">0</div></div>
          <div class="health-card"><div class="text-label">Peso Promedio</div><div class="text-base" id="healthAvgWeight">0.00</div></div>
          <div class="health-card"><div class="text-label">Tasa Supervivencia</div><div class="text-base" id="healthSurvival">0%</div></div>
        </div>
      </section>

      <section class="panel" id="panel-observe">
        <div class="observe-grid">
          <div class="field-group"><label>Open</label><input type="number" step="0.01" id="obOpen" value="100"></div>
          <div class="field-group"><label>High</label><input type="number" step="0.01" id="obHigh" value="103"></div>
          <div class="field-group"><label>Low</label><input type="number" step="0.01" id="obLow" value="97"></div>
          <div class="field-group"><label>Close</label><input type="number" step="0.01" id="obClose" value="102"></div>
          <div class="field-group"><label>Volume</label><input type="number" step="1" id="obVolume" value="1200"></div>
          <div class="field-group"><label>RSI</label><input type="number" step="0.1" id="obRsi" value="30"></div>
          <div class="field-group"><label>Session</label><select id="obSession"><option>asia</option><option>london</option><option>newyork</option></select></div>
          <div class="field-group"><label>Trend</label><select id="obTrend"><option>bullish</option><option>neutral</option><option>bearish</option></select></div>
        </div>
        <div style="margin-top:10px; display:flex; gap:8px;"><button class="btn-primary" id="btnObserve">Observar vela</button><button class="btn-ghost" id="btnWin">Feedback WIN</button><button class="btn-ghost" id="btnLoss">Feedback LOSS</button></div>
        <div style="margin-top:12px;"><div class="signal-badge wait" id="signalBadge"><span class="confidence-fill" id="confidenceFill" style="width:0%"></span><span id="signalText">WAIT · 0%</span></div></div>
      </section>

      <section class="panel" id="panel-narrative">
        <div class="narrative-panel">
          <div class="narrative-history" id="narrativeHistory">Sin historial.</div>
          <div class="narrative-text narrative" id="narrativeText"></div>
        </div>
        <div class="log" id="log" style="margin-top:12px;"></div>
      </section>

      <section class="panel" id="panel-neurons">
        <div id="neuronsList"></div>
      </section>
    </main>
  </section>
</div>

<script>
const NARRATIVE_TEMPLATES = {
  pinBar: 'Veo una mecha {direction} prominente. El precio rechazó {zone}.',
  engulfing: 'Vela envolvente {direction}. La presión {side} domina.',
  rsiExtreme: 'RSI en zona {zone} ({value}). El precio podría {action}.',
  confluence: 'Confluencia de {count} señales en la misma dirección.',
  noPattern: 'Sin patrón claro. El mercado está en indecisión.',
  warning: 'Zona de riesgo. {reason}. Mejor esperar confirmación.',
  signal: '{signal} con {confidence}% de confianza basado en {neurons} neuronas.'
};

class LivingBrain {
  constructor() {
    this.neurons = new Map();
    this.generation = 1;
    this.observations = 0;
    this.pendingPatterns = [];
    this.consolidationThreshold = 3;
    this.lastActivated = [];
    this.contextHistory = new Map();
    this.backtestCycles = 0;
    this.minActivationsForEvolution = 5;
    this.totalNeuronsBorn = 0;
    this.totalNeuronsDied = 0;
    this.backtestDelayMs = 80;
    this.performanceHistory = [];
    this.autoPatternCounter = 0;
    this.transcriptConceptMap = [
      { key: 'compradores atrapados', label: 'Compradores Atrapados', type: 'pattern', signal: 'SELL', regex: /compradores? atrapados?|buyers? trapped/i },
      { key: 'rendicion', label: 'Rendición', type: 'concept', signal: 'SELL', regex: /rendici[oó]n|capitulaci[oó]n/i },
      { key: 'cambio polaridad', label: 'Cambio de Polaridad', type: 'rule', signal: 'WAIT', regex: /cambio de polaridad|polaridad|flip/i },
      { key: 'area cara barata', label: 'Área Cara\/Barata', type: 'concept', signal: 'WAIT', regex: /[aá]rea\s+cara|[aá]rea\s+barata|premium|discount/i },
      { key: 'vela sin mecha', label: 'Vela sin Mecha', type: 'pattern', signal: 'BUY', regex: /vela\s+sin\s+mecha|marubozu|sin mecha/i },
      { key: 'ruptura', label: 'Ruptura', type: 'rule', signal: 'WAIT', regex: /ruptura|breakout/i }
    ];
    this.variantFamilies = new Map();
    this.superNeuronThreshold = 60;
    this.superNeuronMinDaughters = 3;
    this.criticalPopulationNotified = false;
    this.testMode = 'discovery';
    this.maxNeurons = 1000;
    this.autoLearn = true;
    this.pruningEnabled = false;
    this.radicalPruning = false;
    this.testModes = {
      discovery: {
        key: 'discovery',
        label: 'Fase 1: Descubrimiento',
        autoLearn: true,
        entropyEnabled: false,
        deathThreshold: 0.25,
        winRateTracking: false,
        fusionEnabled: false
      },
      validation: {
        key: 'validation',
        label: 'Fase 2: Validación',
        autoLearn: false,
        entropyEnabled: true,
        deathThreshold: 0.05,
        winRateTracking: true,
        fusionEnabled: false
      },
      selection: {
        key: 'selection',
        label: 'Fase 3: Selección',
        autoLearn: false,
        entropyEnabled: true,
        deathThreshold: 0.4,
        winRateTracking: false,
        fusionEnabled: true
      }
    };
  }

  getModeConfig(mode = this.testMode) {
    const base = this.testModes[mode] || this.testModes.discovery;
    const deathThreshold = this.radicalPruning ? 0.45 : base.deathThreshold;
    return { ...base, autoLearn: this.autoLearn, entropyEnabled: this.pruningEnabled && base.entropyEnabled, deathThreshold };
  }

  setTestMode(mode) {
    const nextMode = this.testModes[mode] ? mode : 'discovery';
    const previousMode = this.testMode;
    this.testMode = nextMode;

    if (nextMode === 'validation' && previousMode !== 'validation') this.resetWinRateTracking();
    if (nextMode === 'selection' && previousMode !== 'selection') this.pendingPatterns = [];

    if (nextMode === 'discovery') {
      this.autoLearn = true;
      this.pruningEnabled = false;
      this.radicalPruning = false;
    } else if (nextMode === 'validation') {
      this.autoLearn = false;
      this.pruningEnabled = true;
      this.radicalPruning = false;
    } else {
      this.autoLearn = false;
      this.pruningEnabled = true;
      this.radicalPruning = true;
    }

    return this.getModeConfig();
  }

  resetPerformance() {
    this.resetWinRateTracking();
  }

  resetWinRateTracking() {
    for (const neuron of this.neurons.values()) {
      neuron.activations = 0;
      neuron.correctPredictions = 0;
      neuron.successfulActivations = 0;
      neuron.recentOutcomes = [];
    }
    this.performanceHistory = [];
  }

  normalizeNeuronBaseName(name = '') {
    return String(name || '')
      .toLowerCase()
      .replace(/s[uú]per neurona\s*/gi, '')
      .replace(/especializaci[oó]n\s*/gi, '')
      .replace(/\s*#\d+/g, '')
      .replace(/\s*\([^)]*\)/g, '')
      .replace(/[+|].*$/g, '')
      .trim();
  }

  mergeTriggersWithAnd(triggersList = []) {
    const merged = {};
    for (const triggers of triggersList) {
      if (!triggers || typeof triggers !== 'object') continue;
      if (triggers.bodyRatio) merged.bodyRatio = this.mergeRangeFilter(merged.bodyRatio, triggers.bodyRatio);
      if (triggers.wickLower) {
        merged.wickLower = {
          min: Math.max(merged.wickLower?.min ?? 0, triggers.wickLower.min ?? 0),
          max: Math.min(merged.wickLower?.max ?? Number.POSITIVE_INFINITY, triggers.wickLower.max ?? Number.POSITIVE_INFINITY)
        };
      }
      if (triggers.rsiRange) merged.rsiRange = this.mergeRangeFilter(merged.rsiRange, triggers.rsiRange);
      if (triggers.stochasticRange) merged.stochasticRange = this.mergeRangeFilter(merged.stochasticRange, triggers.stochasticRange);
      if (triggers.trend) {
        if (!merged.trend) merged.trend = triggers.trend;
        else if (merged.trend !== triggers.trend) return null;
      }
      if (triggers.emaBias) {
        if (!merged.emaBias) merged.emaBias = triggers.emaBias;
        else if (merged.emaBias !== triggers.emaBias) return null;
      }
    }
    return merged;
  }

  mergeEliteNeurons() {
    const elite = Array.from(this.neurons.values()).filter((neuron) => ['pattern', 'rule'].includes(neuron.type) && neuron.weight > 0.7);
    const groups = new Map();

    elite.forEach((neuron) => {
      const base = this.normalizeNeuronBaseName(neuron.name);
      if (!base) return;
      if (!groups.has(base)) groups.set(base, []);
      groups.get(base).push(neuron);
    });

    let created = 0;
    let removed = 0;

    for (const [base, neurons] of groups.entries()) {
      if (neurons.length < 2) continue;
      const mergedTriggers = this.mergeTriggersWithAnd(neurons.map((n) => n.triggers));
      if (!mergedTriggers || !Object.keys(mergedTriggers).length) continue;

      const superNeuron = this.makeNeuron({
        name: `Súper Neurona ${this.simplifyNeuronName(base)}`,
        type: 'super',
        triggers: mergedTriggers,
        weight: Math.min(1, neurons.reduce((acc, neuron) => acc + neuron.weight, 0) / neurons.length + 0.08),
        description: `Fusión AND de ${neurons.map((neuron) => neuron.name).join(' + ')}`,
        signal: neurons.every((neuron) => neuron.signal === neurons[0].signal) ? neurons[0].signal : 'WAIT',
        generation: Math.max(...neurons.map((neuron) => neuron.generation || 1)) + 1
      });

      superNeuron.isSuper = true;
      superNeuron.isProtected = true;
      this.neurons.set(superNeuron.id, superNeuron);
      dispatchEvent(new CustomEvent('neuron:born', { detail: superNeuron }));
      created += 1;

      for (const neuron of neurons) {
        if (this.neurons.delete(neuron.id)) removed += 1;
      }
    }

    for (const neuron of this.neurons.values()) {
      neuron.connections = neuron.connections.filter((conn) => this.neurons.has(this.normalizeConnection(conn).to));
    }

    return { created, removed };
  }

  mergeAndGold() {
    const fusionSummary = this.mergeEliteNeurons();
    const pruneSummary = this.pruneByBacktestWinRate(this.radicalPruning ? 55 : 50);
    return { fusionSummary, pruneSummary };
  }

  promoteMasterNeuron(neuron) {
    if (!neuron || neuron.isMaster) return;
    if (neuron.weight > 0.7 && neuron.activations > 25) {
      neuron.isMaster = true;
      if (typeof addLog === 'function') addLog(`👑 Neurona maestra protegida: ${neuron.name}`);
    }
  }

  clampNeuronWeight(neuron, nextWeight) {
    const minWeight = neuron?.isMaster ? 0.3 : 0;
    return Math.min(1, Math.max(minWeight, nextWeight));
  }

  getOutcomeDelta(neuron, outcome) {
    if (outcome === 'WIN') return neuron?.isMaster ? 0.25 : 0.15;
    return neuron?.isMaster ? -0.20 : (neuron?.isProtected ? -0.05 : -0.20);
  }

  shouldSuspendPruning() {
    const isCriticalPopulation = this.neurons.size < 5;
    if (isCriticalPopulation && !this.criticalPopulationNotified) {
      if (typeof addLog === 'function') {
        addLog('⚠️ Alerta: Población neuronal crítica. Poda suspendida para preservar el aprendizaje.');
      }
      this.criticalPopulationNotified = true;
    }
    if (!isCriticalPopulation) this.criticalPopulationNotified = false;
    return isCriticalPopulation;
  }

  extractFeatures(c) {
    const body = Math.max(0.0001, Math.abs(c.close - c.open));
    const range = Math.max(0.0001, c.high - c.low);
    const upperWick = c.high - Math.max(c.open, c.close);
    const lowerWick = Math.min(c.open, c.close) - c.low;
    return {
      bodyRatio: body / range,
      wickUpper: upperWick / body,
      wickLower: lowerWick / body,
      trend: c.trend || (c.close > c.open ? 'bullish' : c.close < c.open ? 'bearish' : 'neutral'),
      rsi: c.rsi ?? 50,
      stochastic: c.stochastic ?? c.stoch ?? c.rsi ?? 50,
      emaBias: c.emaBias || (c.close >= c.open ? 'above' : 'below'),
      rsiRange: { min: Math.max(0, (c.rsi ?? 50) - 8), max: Math.min(100, (c.rsi ?? 50) + 8) },
      session: c.session || 'asia'
    };
  }

  makeNeuron({ name, type, triggers, weight, description, signal, generation = 1 }) {
    let index = this.neurons.size + 1;
    let id = `n_${String(index).padStart(3, '0')}`;
    while (this.neurons.has(id)) {
      index += 1;
      id = `n_${String(index).padStart(3, '0')}`;
    }
    this.totalNeuronsBorn += 1;
    return { id, born: Date.now(), name, type, triggers, weight, activations: 0, activationsThreshold: 15, correctPredictions: 0, successfulActivations: 0, connections: [], description, signal, confidence: weight, generation, activationLimit: 6, isTesting: false, isNew: true };
  }

  getNeuronWinRate(neuron) {
    if (!neuron || !neuron.activations) return 0;
    return (neuron.correctPredictions / neuron.activations) * 100;
  }

  pickRandomConfluenceFilter() {
    const options = ['EMA', 'RSI', 'Estocástico'];
    return options[Math.floor(Math.random() * options.length)];
  }

  addConfluenceFilterToTriggers(baseTriggers = {}, filterType = 'RSI') {
    const triggers = { ...baseTriggers };
    if (filterType === 'EMA') {
      triggers.emaBias = Math.random() > 0.5 ? 'above' : 'below';
      return triggers;
    }

    if (filterType === 'Estocástico') {
      const center = Math.floor(Math.random() * 61) + 20;
      triggers.stochasticRange = {
        min: Math.max(0, center - 12),
        max: Math.min(100, center + 12)
      };
      return triggers;
    }

    const center = Math.floor(Math.random() * 61) + 20;
    triggers.rsiRange = {
      min: Math.max(0, center - 10),
      max: Math.min(100, center + 10)
    };
    return triggers;
  }

  createVariant(mother) {
    if (!mother || mother.variantFamilyActive) return [];
    const filters = ['EMA', 'RSI', 'Estocástico'];
    const daughters = filters.map((filterType) => {
      const variantIndex = filters.indexOf(filterType) + 1;
      const daughter = this.birthNeuron({
        name: `${mother.name} (Hija ${filterType})`,
        features: this.addConfluenceFilterToTriggers(mother.triggers, filterType),
        signal: mother.signal,
        description: `Variante de confluencia ${filterType} derivada de ${mother.name}`,
        generation: Math.max(2, (mother.generation || 1) + 1),
        weight: Math.max(0.55, mother.weight * 0.95),
        isTesting: true
      });

      daughter.lineage = {
        motherId: mother.id,
        motherName: mother.name,
        extraFilter: filterType,
        variantLabel: `V${variantIndex}`,
        role: 'daughter',
        familyId: `${mother.id}-${Date.now()}`
      };
      daughter.recentOutcomes = [];
      return daughter;
    });

    mother.variantFamilyActive = true;
    mother.recentOutcomes = mother.recentOutcomes || [];
    const familyId = daughters[0]?.lineage?.familyId;
    daughters.forEach((daughter) => {
      daughter.lineage.familyId = familyId;
      this.connectNeurons(mother.id, daughter.id, 0.7, { source: 'golden-moment' });
    });
    this.variantFamilies.set(familyId, { motherId: mother.id, daughterIds: daughters.map((d) => d.id), resolved: false });

    if (typeof addLog === 'function' && daughters.length) {
      addLog(`✨ Momento de oro detectado en ${mother.name}. Nacen variantes EMA/RSI/Estocástico para competir.`);
    }
    return daughters;
  }

  mergeRangeFilter(baseRange, incomingRange) {
    if (!baseRange) return { ...incomingRange };
    if (!incomingRange) return { ...baseRange };
    return {
      min: Math.max(baseRange.min ?? 0, incomingRange.min ?? 0),
      max: Math.min(baseRange.max ?? 100, incomingRange.max ?? 100)
    };
  }

  composeSuperNeuronTriggers(mother, daughters = []) {
    const merged = { ...(mother?.triggers || {}) };
    daughters.forEach((daughter) => {
      const t = daughter?.triggers || {};
      if (t.emaBias) merged.emaBias = t.emaBias;
      if (t.rsiRange) merged.rsiRange = this.mergeRangeFilter(merged.rsiRange, t.rsiRange);
      if (t.stochasticRange) merged.stochasticRange = this.mergeRangeFilter(merged.stochasticRange, t.stochasticRange);
      if (t.wickLower) merged.wickLower = { ...t.wickLower };
      if (t.bodyRatio) merged.bodyRatio = { ...t.bodyRatio };
      if (t.trend) merged.trend = t.trend;
    });
    return merged;
  }

  archiveLineage(mother, daughters = []) {
    const lineageIds = [mother?.id, ...daughters.map((d) => d.id)].filter(Boolean);
    lineageIds.forEach((id) => {
      if (this.neurons.delete(id)) this.totalNeuronsDied += 1;
    });
    for (const neuron of this.neurons.values()) {
      neuron.connections = neuron.connections.filter((conn) => !lineageIds.includes(this.normalizeConnection(conn).to));
    }
  }

  distillKnowledge() {
    this.variantFamilies.forEach((family) => {
      if (family.resolved) return;
      const mother = this.neurons.get(family.motherId);
      if (!mother) return;
      const daughters = family.daughterIds.map((id) => this.neurons.get(id)).filter(Boolean);
      if (!daughters.length) return;

      const successfulDaughters = daughters.filter((daughter) => this.getNeuronWinRate(daughter) > this.superNeuronThreshold);

      if (successfulDaughters.length >= this.superNeuronMinDaughters) {
        const variantTags = successfulDaughters
          .map((daughter) => daughter?.lineage?.variantLabel)
          .filter(Boolean);
        const superNeuron = this.birthNeuron({
          name: `Súper Neurona: ${mother.name} [${variantTags.join(', ')}]`,
          features: this.composeSuperNeuronTriggers(mother, successfulDaughters),
          signal: mother.signal,
          description: `Destilación de linaje de ${mother.name} con confluencia de ${variantTags.join(', ')}`,
          generation: Math.max((mother.generation || 1) + 1, ...successfulDaughters.map((d) => d.generation || 1)),
          weight: 0.9,
          isProtected: true
        });
        superNeuron.type = 'super';
        superNeuron.isSuperNeuron = true;
        superNeuron.isSuper = true;
        superNeuron.lineage = {
          role: 'super',
          motherId: mother.id,
          daughterIds: successfulDaughters.map((d) => d.id),
          familyId: family.motherId,
          variantTags
        };
        this.archiveLineage(mother, daughters);
        if (typeof addLog === 'function') {
          addLog(`🌟 Destilación completada: ${superNeuron.name} creada con peso inicial 0.9. Linaje original archivado.`);
        }
      }

      family.resolved = true;
    });
  }

  evaluateGoldenMoment(neuron) {
    if (!neuron || neuron.variantFamilyActive) return;
    const recent = neuron.recentOutcomes || [];
    if (recent.length < 10) return;
    const lastTen = recent.slice(-10);
    const wins = lastTen.filter((r) => r === 'WIN').length;
    const accuracy = (wins / 10) * 100;
    if (accuracy >= 80) this.createVariant(neuron);
  }

  normalizeConnection(conn) {
    return typeof conn === 'string' ? { to: conn, weight: 0.8, source: 'legacy' } : conn;
  }

  connectNeurons(fromId, toId, weight = 0.6, meta = {}) {
    const from = this.neurons.get(fromId);
    if (!from || !this.neurons.has(toId) || fromId === toId) return false;
    const existing = from.connections.find((conn) => this.normalizeConnection(conn).to === toId);
    if (existing) {
      const normalized = this.normalizeConnection(existing);
      normalized.weight = Math.max(normalized.weight ?? 0, weight);
      normalized.source = normalized.source || meta.source || 'manual';
      if (typeof existing === 'string') {
        from.connections = from.connections.map((conn) => conn === existing ? normalized : conn);
      }
      return false;
    }
    from.connections.push({ to: toId, weight, source: meta.source || 'manual', createdAt: Date.now() });
    return true;
  }

  simplifyNeuronName(name) {
    return name
      .replace(/\s*\(.*?\)/g, '')
      .split(/\s+/)
      .slice(0, 3)
      .join(' ')
      .trim();
  }

  getRelevanceMultiplier(neuron) {
    const strategicPattern = neuron.type === 'pattern' && /atrapados|fuerza/i.test(neuron.name);
    return strategicPattern ? 1.5 : 1;
  }

  calculateCandleNature(candle) {
    const open = Number(candle.open);
    const high = Number(candle.high);
    const low = Number(candle.low);
    const close = Number(candle.close);
    const range = Math.max(0.0001, high - low);
    const body = Math.abs(close - open);
    const bodyRatio = body / range;
    const upperWick = Math.max(0, high - Math.max(open, close));
    const lowerWick = Math.max(0, Math.min(open, close) - low);
    return {
      direction: close > open ? 'bullish' : close < open ? 'bearish' : 'neutral',
      body,
      range,
      bodyRatio,
      upperWick,
      lowerWick,
      upperWickRatio: upperWick / range,
      lowerWickRatio: lowerWick / range,
      isDoji: bodyRatio < 0.1,
      isLargeBody: bodyRatio > 0.7
    };
  }

  parseNumberish(value) {
    if (typeof value === 'number') return value;
    if (typeof value !== 'string') return Number(value) || 0;
    const cleaned = value.trim().replace(/\s+/g, '');
    if (cleaned.includes(',') && cleaned.includes('.')) {
      return cleaned.lastIndexOf(',') > cleaned.lastIndexOf('.')
        ? Number(cleaned.replace(/\./g, '').replace(',', '.'))
        : Number(cleaned.replace(/,/g, ''));
    }
    if (cleaned.includes(',')) return Number(cleaned.replace(',', '.'));
    return Number(cleaned);
  }

  parseTradeData(csvText) {
    const lines = (csvText || '').split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
    if (!lines.length) return [];

    const splitCsvLine = (line) => {
      const delimiter = line.includes(';') ? ';' : ',';
      return line.split(new RegExp(`${delimiter}(?=(?:[^\"]*\"[^\"]*\")*[^\"]*$)`)).map((part) => part.trim());
    };

    const cleanPrice = (val) => {
      const cleaned = String(val || '').replace(/"/g, '').trim().replace(',', '.');
      return parseFloat(cleaned);
    };

    return lines.slice(1).map((line) => {
      const v = splitCsvLine(line);
      if (v.length < 5) return null;
      return {
        timestamp: String(v[0] || '').replace(/"/g, '').trim(),
        open: cleanPrice(v[1]),
        high: cleanPrice(v[2]),
        low: cleanPrice(v[3]),
        close: cleanPrice(v[4]),
        rsi: 50
      };
    }).filter((candle) => candle && [candle.open, candle.high, candle.low, candle.close].every(Number.isFinite));
  }

  applyEntropy() {
    const modeConfig = this.getModeConfig();
    if (!modeConfig.entropyEnabled || this.shouldSuspendPruning()) return;
    const entropyDecay = 0.005;
    const DEATH_THRESHOLD = modeConfig.deathThreshold;
    for (const [id, neuron] of this.neurons.entries()) {
      const dynamicLearningRate = neuron.activations > 50 && neuron.weight < 0.4 ? 2 : 1;
      neuron.weight = this.clampNeuronWeight(neuron, neuron.weight - (entropyDecay * dynamicLearningRate));
      neuron.confidence = neuron.weight;
      this.promoteMasterNeuron(neuron);
      const activationThreshold = neuron.activationsThreshold ?? 15;
      const canBePruned = neuron.activations >= activationThreshold;
      if (neuron.generation > 1 && neuron.weight < DEATH_THRESHOLD && !neuron.isProtected && !neuron.isTesting && !neuron.isMaster && canBePruned) {
        this.neurons.delete(id);
        this.totalNeuronsDied += 1;
      }
    }
    for (const neuron of this.neurons.values()) {
      neuron.connections = neuron.connections.filter((conn) => this.neurons.has(this.normalizeConnection(conn).to));
    }
  }

  pruneNoise() {
    const modeConfig = this.getModeConfig();
    if (this.shouldSuspendPruning()) return 0;
    if (modeConfig.deathThreshold <= 0.05) return 0;
    const now = Date.now();
    const fiveMinutesMs = 5 * 60 * 1000;
    const ruleNeurons = Array.from(this.neurons.values()).filter((neuron) => neuron.type === 'rule');
    const avgRulePerformance = ruleNeurons.length
      ? ruleNeurons.reduce((acc, neuron) => {
          const wr = neuron.activations > 0 ? (neuron.correctPredictions / neuron.activations) * 100 : 0;
          return acc + wr;
        }, 0) / ruleNeurons.length
      : null;

    const removableIds = [];
    for (const [id, neuron] of this.neurons.entries()) {
      const winRate = neuron.activations > 0 ? (neuron.correctPredictions / neuron.activations) * 100 : 0;
      const activationThreshold = neuron.activationsThreshold ?? 15;
      const canBePruned = neuron.activations >= activationThreshold;
      const lowWinRate = neuron.activations > 50 && winRate < 35;
      const protectedNewGen1 = neuron.generation === 1 && (now - (neuron.born || 0)) < fiveMinutesMs;
      const lowWeight = neuron.weight < modeConfig.deathThreshold && !protectedNewGen1 && canBePruned;
      const isVideoConceptLoser = neuron.name.includes('Concepto video') && avgRulePerformance !== null && winRate < avgRulePerformance;
      if (neuron.isProtected || neuron.isTesting || neuron.isMaster || !canBePruned) continue;
      if (lowWinRate || lowWeight || isVideoConceptLoser) removableIds.push(id);
    }

    removableIds.forEach((id) => {
      if (this.neurons.delete(id)) this.totalNeuronsDied += 1;
    });

    for (const neuron of this.neurons.values()) {
      neuron.connections = neuron.connections.filter((conn) => this.neurons.has(this.normalizeConnection(conn).to));
      neuron.weight = this.clampNeuronWeight(neuron, neuron.weight + 0.05);
      neuron.confidence = neuron.weight;
      this.promoteMasterNeuron(neuron);
    }

    return removableIds.length;
  }

  async runBacktest(data = []) {
    const candles = Array.isArray(data) ? data : [];
    let wins = 0;
    let losses = 0;
    this.variantFamilies = new Map();

    for (let i = 0; i < candles.length - 1; i++) {
      const candle = candles[i];
      const nextCandle = candles[i + 1];
      if (!candle || !nextCandle) continue;

      this.observations += 1;
      const features = this.extractFeatures(candle);
      const candleOutcome = nextCandle.close >= candle.close ? 'WIN' : 'LOSS';
      this.pendingPatterns.push({ features, outcome: candleOutcome, timestamp: Date.now() });
      this.checkForNewNeurons();
      const activated = [];
      for (const neuron of this.neurons.values()) {
        const score = this.matchScore(neuron.triggers, features);
        if (score > 0.6) {
          neuron.activations += 1;
          this.promoteMasterNeuron(neuron);
          activated.push({ neuron, score });
        }
      }

      const nextDirection = nextCandle.close > nextCandle.open ? 'bullish' : nextCandle.close < nextCandle.open ? 'bearish' : 'neutral';
      activated.forEach(({ neuron }) => {
        const predictedDirection = neuron.signal === 'BUY' ? 'bullish' : neuron.signal === 'SELL' ? 'bearish' : 'neutral';
        const success = predictedDirection === nextDirection;
        this.applyNeuronOutcome(neuron, success ? 'WIN' : 'LOSS');

        if (success) {
          neuron.successfulActivations += 1;
          wins += 1;
        } else {
          losses += 1;
        }
      });

      this.lastActivated = activated;
      this.performanceHistory.push({ timestamp: Date.now(), index: i + 1, outcome: candleOutcome, wins, losses, active: activated.length });
      if (this.performanceHistory.length > 1313) this.performanceHistory = this.performanceHistory.slice(-1313);
      if (this.observations % 10 === 0) this.applyEntropy();
      dispatchEvent(new CustomEvent('backtest:tick', { detail: { index: i + 1, total: candles.length - 1, wins, losses, active: activated.length } }));
      await new Promise((resolve) => setTimeout(resolve, this.backtestDelayMs));
    }

    this.backtestCycles += 1;

    this.distillKnowledge();

    for (const neuron of this.neurons.values()) {
      if (neuron.autoDiscovered && neuron.weight > 0.6) {
        neuron.validationStatus = 'Patrón Validado';
        neuron.isProtected = true;
      }
    }

    if (Math.max(0, candles.length - 1) >= 1313) {
      const generationResult = this.finalizeGenerationTest();
      if (typeof addLog === 'function') {
        addLog(`🧪 Evaluación diferida completada: ${generationResult.removed} neuronas de prueba no superaron el umbral final.`);
      }
    }

    const report = this.generateSurvivalReport();
    if (typeof saveState === 'function') await saveState('backtest');
    return { candlesProcessed: Math.max(0, candles.length - 1), wins, losses, activations: wins + losses, report };
  }

  pruneByBacktestWinRate(minWinRate = 55) {
    const removable = [];

    for (const neuron of this.neurons.values()) {
      const winRate = this.getNeuronWinRate(neuron);
      if (winRate < minWinRate && !neuron.isMaster) removable.push(neuron.id);
    }

    removable.forEach((id) => {
      if (this.neurons.delete(id)) this.totalNeuronsDied += 1;
    });

    for (const neuron of this.neurons.values()) {
      neuron.connections = neuron.connections.filter((conn) => this.neurons.has(this.normalizeConnection(conn).to));
    }

    return { minWinRate, removed: removable.length };
  }


  finalizeGenerationTest() {
    const modeConfig = this.getModeConfig();
    const testingNeurons = Array.from(this.neurons.values()).filter((neuron) => neuron.isTesting);
    const removable = [];

    testingNeurons.forEach((neuron) => {
      const winRate = this.getNeuronWinRate(neuron);
      const failedWinRate = winRate < 55;
      const failedWeight = neuron.weight < 0.3;
      if ((failedWinRate || failedWeight) && !neuron.isMaster && modeConfig.deathThreshold > 0.05) removable.push(neuron.id);
    });

    Array.from(this.neurons.values()).forEach((neuron) => {
      neuron.isTesting = false;
    });

    removable.forEach((id) => {
      if (this.neurons.delete(id)) this.totalNeuronsDied += 1;
    });

    for (const neuron of this.neurons.values()) {
      neuron.connections = neuron.connections.filter((conn) => this.neurons.has(this.normalizeConnection(conn).to));
    }

    return { tested: testingNeurons.length, removed: removable.length };
  }

  generateSurvivalReport() {
    const neurons = Array.from(this.neurons.values());
    const ranked = neurons
      .filter((neuron) => neuron.activations > 10)
      .map((neuron) => ({
        ...neuron,
        winRate: neuron.activations ? (neuron.correctPredictions / neuron.activations) * 100 : 0
      }))
      .sort((a, b) => b.winRate - a.winRate);

    const grouped = ['concept', 'rule', 'pattern'].map((type) => {
      const group = neurons.filter((neuron) => neuron.type === type);
      const avgWeight = group.length ? group.reduce((acc, neuron) => acc + neuron.weight, 0) / group.length : 0;
      return { type, count: group.length, avgWeight };
    });

    const falseProphets = ranked.filter((neuron) => neuron.activations > 50 && neuron.winRate < 35);
    const topWinners = ranked.slice(0, 3);

    const lines = [
      '🧠 ===== REPORTE DE RENDIMIENTO NEURONAL =====',
      `📊 Neuronas analizadas (act > 10): ${ranked.length}`,
      topWinners.length
        ? `🏆 TOP neuronas: ${topWinners.map((n, idx) => `${idx + 1}. \"${n.name}\" (${n.type}) ${n.winRate.toFixed(1)}%`).join(' | ')}`
        : '🏆 TOP neuronas: Aún no hay suficientes activaciones para ranking.',
      ...ranked.slice(0, 10).map((neuron) => {
        const icon = neuron.winRate >= 60 ? '🏆 MVP' : neuron.winRate >= 35 ? '⚠️ Dudosa' : '💀 Eliminar';
        const note = neuron.winRate >= 60 ? 'Dale más importancia.' : neuron.winRate >= 35 ? 'Aún está aprendiendo.' : 'Ruido potencial para esta temporalidad.';
        return `${icon}: \"${neuron.name}\" (${neuron.type}) -> Win Rate ${neuron.winRate.toFixed(1)}% · act:${neuron.activations}. ${note}`;
      }),
      '🧬 Peso promedio por tipo:',
      ...grouped.map((group) => `${group.count ? '✅' : '⚪'} ${group.type}: ${group.avgWeight.toFixed(3)} (${group.count} neuronas)`),
      falseProphets.length
        ? `💀 Ruido de Mercado detectado: ${falseProphets.map((n) => `\"${n.name}\" ${n.winRate.toFixed(1)}%/${n.activations} act`).join(' | ')}`
        : '✅ Sin Falsos Profetas activos (act > 50 y win rate < 35%).',
      '🧠 ==========================================='
    ];

    console.log(lines.join('\n'));
    return { lines, ranked, grouped, falseProphets };
  }

  parseMarketData(raw, fileType = 'json') {
    const normalizedType = String(fileType || '').toLowerCase();
    if (normalizedType.includes('json')) {
      const data = JSON.parse(raw);
      return (Array.isArray(data) ? data : []).map((row) => ({
        timestamp: row.timestamp || row.time || row.date || '',
        open: this.parseNumberish(row.open),
        high: this.parseNumberish(row.high),
        low: this.parseNumberish(row.low),
        close: this.parseNumberish(row.close)
      })).filter((candle) => [candle.open, candle.high, candle.low, candle.close].every(Number.isFinite));
    }
    return this.parseTradeData(raw);
  }



  getBrainHealthIndex() {
    if (!this.neurons.size) return 0;
    const total = Array.from(this.neurons.values()).reduce((acc, neuron) => acc + neuron.weight, 0);
    return total / this.neurons.size;
  }

  getHealthSnapshot() {
    const alive = this.neurons.size;
    const avgWeight = this.getBrainHealthIndex();
    const survivalRate = this.totalNeuronsBorn ? Math.max(0, (alive / this.totalNeuronsBorn) * 100) : 0;
    return { alive, avgWeight, survivalRate };
  }

  learnFromTranscript(text) {
    const paragraphs = text.split(/\n\s*\n+/).map((s) => s.trim()).filter(Boolean);
    const verbs = /significa|indica|señal|es alcista|es bajista|cuando|si el precio|buscar entrada|confirma|atrapados|rendici[oó]n|polaridad|mecha/i;
    let created = 0;
    paragraphs.forEach((paragraph) => {
      if (!verbs.test(paragraph)) return;
      const lines = paragraph.split(/[.!?\n]/).map((s) => s.trim()).filter(Boolean);
      const paragraphNeurons = [];
      lines.forEach((line) => {
        const signal = /sell|bajista/i.test(line) ? 'SELL' : /buy|alcista/i.test(line) ? 'BUY' : 'WAIT';
        const concepts = this.transcriptConceptMap.filter(({ regex }) => regex.test(line));
        const rsiMatch = line.match(/rsi\s*(?:menor|<)\s*(\d+)|rsi\s*(?:mayor|>)\s*(\d+)/i);
        const rsi = rsiMatch ? Number(rsiMatch[1] || rsiMatch[2]) : 50;
        if (!concepts.length) concepts.push({ label: `Concepto video ${this.neurons.size + 1}`, type: 'concept', signal, key: 'generic' });

        concepts.forEach((concept) => {
          const neuron = this.makeNeuron({
            name: concept.label,
            type: concept.type || 'concept',
            triggers: { bodyRatio: { min: 0, max: 0.45 }, trend: (concept.signal || signal) === 'BUY' ? 'bullish' : (concept.signal || signal) === 'SELL' ? 'bearish' : 'neutral', rsiRange: { min: Math.max(0, rsi - 12), max: Math.min(100, rsi + 12) } },
            weight: concept.key === 'generic' ? 0.5 : 0.62,
            description: line,
            signal: concept.signal || signal
          });
          neuron.source = 'video';
          neuron.conceptKey = concept.key;
          this.neurons.set(neuron.id, neuron);
          paragraphNeurons.push(neuron);
          dispatchEvent(new CustomEvent('neuron:born', { detail: neuron }));
          created += 1;
        });
      });

      for (let i = 0; i < paragraphNeurons.length - 1; i++) {
        const source = paragraphNeurons[i];
        const target = paragraphNeurons[i + 1];
        const semanticPair = /ruptura|cambio polaridad|rendicion|compradores atrapados|vela sin mecha/i;
        if (semanticPair.test(`${source.conceptKey} ${target.conceptKey}`)) {
          this.connectNeurons(source.id, target.id, 0.6, { source: 'transcript' });
        }
      }

      const rupture = paragraphNeurons.find((n) => /ruptura/i.test(n.conceptKey || ''));
      const surrender = paragraphNeurons.find((n) => /rendicion/i.test(n.conceptKey || ''));
      if (rupture && surrender) this.connectNeurons(rupture.id, surrender.id, 0.6, { source: 'transcript' });
    });
    return created;
  }

  learnFromRule(text) {
    const signal = /\bBUY\b|alcista/i.test(text) ? 'BUY' : /\bSELL\b|bajista/i.test(text) ? 'SELL' : 'WAIT';
    const rsi = text.match(/rsi\s*(?:menor|<)\s*(\d+)|rsi\s*(?:mayor|>)\s*(\d+)/i);
    const trend = /alcista/i.test(text) ? 'bullish' : /bajista/i.test(text) ? 'bearish' : 'neutral';
    const neuron = this.makeNeuron({
      name: text.slice(0, 26),
      type: 'rule',
      triggers: { bodyRatio: { min: 0, max: /pin bar|doji/i.test(text) ? 0.3 : 0.6 }, wickLower: { min: /pin bar/i.test(text) ? 2 : 0 }, trend, rsiRange: { min: Math.max(0, Number((rsi && (rsi[1] || rsi[2])) || 50) - 8), max: Math.min(100, Number((rsi && (rsi[1] || rsi[2])) || 50) + 8) } },
      weight: 0.7,
      description: text,
      signal
    });
    this.neurons.set(neuron.id, neuron);
    dispatchEvent(new CustomEvent('neuron:born', { detail: neuron }));
    return neuron;
  }

  findMatchingNeuron(features) {
    for (const n of this.neurons.values()) {
      const s = this.matchScore(n.triggers, features);
      if (s > 0.75) return n;
    }
    return null;
  }

  learnFromCandle(candleData, outcome) {
    const features = this.extractFeatures(candleData);
    const matching = this.findMatchingNeuron(features);
    if (matching) {
      this.applyNeuronOutcome(matching, outcome);
      this.evaluateGoldenMoment(matching);
      return { reinforced: matching.id };
    }
    this.pendingPatterns.push({ features, outcome, timestamp: Date.now() });
    return this.checkForNewNeurons();
  }

  applyNeuronOutcome(neuron, outcome) {
    if (!neuron) return;
    const delta = this.getOutcomeDelta(neuron, outcome);
    neuron.weight = this.clampNeuronWeight(neuron, neuron.weight + delta);
    neuron.correctPredictions += outcome === 'WIN' ? 1 : 0;
    neuron.confidence = neuron.weight;
    neuron.recentOutcomes = neuron.recentOutcomes || [];
    neuron.recentOutcomes.push(outcome);
    if (neuron.recentOutcomes.length > 10) neuron.recentOutcomes = neuron.recentOutcomes.slice(-10);
    this.promoteMasterNeuron(neuron);
    this.evaluateGoldenMoment(neuron);
    this.autopruning(neuron);
  }

  autopruning(neuron) {
    const modeConfig = this.getModeConfig();
    const activationThreshold = neuron?.activationsThreshold ?? 15;
    const canBePruned = (neuron?.activations ?? 0) >= activationThreshold;
    if (!this.pruningEnabled) return false;
    if (!neuron || neuron.type !== 'pattern' || neuron.isProtected || neuron.isTesting || neuron.isMaster || neuron.weight >= modeConfig.deathThreshold || !canBePruned) return false;
    if (modeConfig.deathThreshold <= 0.05) return false;
    if (this.shouldSuspendPruning()) return false;
    if (!this.neurons.delete(neuron.id)) return false;
    this.totalNeuronsDied += 1;
    if (typeof addLog === 'function') addLog('Neurona fallida eliminada por selección natural');
    return true;
  }

  similarity(a, b) {
    return Math.abs(a - b) <= 0.1;
  }

  checkForNewNeurons() {
    if (['validation', 'selection'].includes(this.testMode)) return;
    if (!this.autoLearn) return { autoLearnDisabled: true, pending: this.pendingPatterns.length };
    if (this.neurons.size >= this.maxNeurons) return { maxCapacity: true, pending: this.pendingPatterns.length };
    const groups = new Map();
    this.pendingPatterns.forEach((p) => {
      const signature = `${p.features.trend}|${p.features.bodyRatio.toFixed(2)}|${p.features.wickLower.toFixed(2)}`;
      if (!groups.has(signature)) groups.set(signature, { signature, ref: p.features, items: [] });
      groups.get(signature).items.push(p);
    });

    for (const g of groups.values()) {
      const wins = g.items.filter(i => i.outcome === 'WIN').length;
      const alreadyCreated = Array.from(this.neurons.values()).some((n) => n.type === 'pattern' && n.autoPatternSignature === g.signature);
      if (g.items.length >= 2 && wins >= 1 && !alreadyCreated) {
        const neuron = this.birthNeuron({
          features: g.ref,
          signal: wins / g.items.length > 0.6 ? 'BUY' : 'WAIT',
          description: 'Patrón consolidado desde velas históricas',
          name: `Patrón Auto-Descubierto #${++this.autoPatternCounter}`,
          weight: 0.5,
          autoDiscovered: true,
          autoPatternSignature: g.signature
        });
        this.pendingPatterns = this.pendingPatterns.filter(i => !g.items.includes(i));
        return { born: neuron.id };
      }
    }
    return { pending: this.pendingPatterns.length };
  }

  birthNeuron(pattern) {
    const neuron = this.makeNeuron({
      name: pattern.name || `Mecha ${pattern.signal === 'BUY' ? 'Alcista' : pattern.signal === 'SELL' ? 'Bajista' : 'Mixta'} RSI`,
      type: 'pattern',
      triggers: pattern.features,
      weight: pattern.weight ?? 0.6,
      description: pattern.description,
      signal: pattern.signal,
      generation: pattern.generation || 1
    });
    neuron.autoDiscovered = Boolean(pattern.autoDiscovered);
    neuron.autoPatternSignature = pattern.autoPatternSignature || null;
    neuron.validationStatus = pattern.validationStatus || null;
    neuron.isProtected = Boolean(pattern.isProtected);
    neuron.isTesting = Boolean(pattern.isTesting || pattern.autoDiscovered);
    this.neurons.set(neuron.id, neuron);
    dispatchEvent(new CustomEvent('neuron:born', { detail: neuron }));
    return neuron;
  }

  evolveNeurons() {
    const daughters = [];

    for (const neuron of this.neurons.values()) {
      if (neuron.weight <= 0.85 || neuron.correctPredictions <= 10) continue;
      if (neuron.generation >= 4) continue;

      const daughter = this.birthNeuron({
        features: { ...neuron.triggers },
        signal: neuron.signal,
        description: `Especialización por mérito de ${neuron.name}`,
        generation: neuron.generation + 1
      });

      daughter.name = `Especialización ${this.simplifyNeuronName(neuron.name)}`;
      daughter.activationLimit = (neuron.activationLimit || this.minActivationsForEvolution) + 2;
      daughter.type = 'meta';
      daughter.weight = daughter.generation === 2 ? 0.5 : Math.max(0.5, Math.min(1, neuron.weight - 0.05));
      daughter.confidence = daughter.weight;
      daughter.inheritedFrom = neuron.id;
      this.connectNeurons(neuron.id, daughter.id, 0.72, { source: 'evolution' });
      daughters.push(daughter.id);
    }

    if (daughters.length) this.generation = Math.max(this.generation, ...daughters.map(id => this.neurons.get(id)?.generation || 1));
    return daughters;
  }

  matchScore(triggers, f) {
    let score = 0;
    let total = 0;
    if (triggers.bodyRatio) { total += 1; score += (f.bodyRatio >= (triggers.bodyRatio.min ?? 0) && f.bodyRatio <= (triggers.bodyRatio.max ?? 1)) ? 1 : 0; }
    if (triggers.wickLower) { total += 1; score += f.wickLower >= (triggers.wickLower.min ?? 0) ? 1 : 0; }
    if (triggers.trend) { total += 1; score += f.trend === triggers.trend ? 1 : 0; }
    if (triggers.rsiRange) { total += 1; score += (f.rsi >= triggers.rsiRange.min && f.rsi <= triggers.rsiRange.max) ? 1 : 0; }
    if (triggers.emaBias) { total += 1; score += f.emaBias === triggers.emaBias ? 1 : 0; }
    if (triggers.stochasticRange) { total += 1; score += (f.stochastic >= triggers.stochasticRange.min && f.stochastic <= triggers.stochasticRange.max) ? 1 : 0; }
    return total ? score / total : 0;
  }

  resolveSignal(activated) {
    if (!activated.length) return 'WAIT';
    const tally = { BUY: 0, SELL: 0, WAIT: 0 };
    activated.forEach(({ neuron, score }) => tally[neuron.signal || 'WAIT'] += score * neuron.weight);
    return Object.entries(tally).sort((a,b) => b[1] - a[1])[0][0];
  }

  computeConfidence(activated) {
    if (!activated.length) return 0;
    const top = activated.slice(0, 4).reduce((acc, x) => acc + (x.score * x.neuron.weight), 0) / Math.min(4, activated.length);
    return Math.min(0.99, top);
  }

  generateNarrative(activated, features) {
    if (!activated.length) return 'Vela sin patrón reconocido. Mercado en equilibrio. Sin señal.';
    if (activated.length <= 2) {
      const n = activated[0].neuron;
      return `Detecto ${n.name}. ${n.description}. Confianza moderada.`;
    }
    const names = activated.slice(0, 3).map(x => x.neuron.name).join(' + ');
    const direction = features.trend === 'bullish' ? 'alcista' : features.trend === 'bearish' ? 'bajista' : 'lateral';
    return `Confluencia detectada: ${names}. ${NARRATIVE_TEMPLATES.confluence.replace('{count}', activated.length)} El mercado muestra contexto ${direction}.`;
  }

  observeCandle(candleData) {
    this.observations += 1;
    const features = this.extractFeatures(candleData);
    const activated = [];
    for (const neuron of this.neurons.values()) {
      const score = this.matchScore(neuron.triggers, features);
      if (score > 0.6) {
        neuron.activations += 1;
        this.promoteMasterNeuron(neuron);
        activated.push({ neuron, score });
        (this.contextHistory.get(neuron.id) || this.contextHistory.set(neuron.id, []).get(neuron.id)).push(features.trend);
        neuron.connections.forEach((rawConn) => {
          const { to: connId, weight: connWeight = 0.8 } = this.normalizeConnection(rawConn);
          const conn = this.neurons.get(connId);
          if (conn) activated.push({ neuron: conn, score: score * connWeight, chained: true, from: neuron.id, to: connId });
        });
      }
    }
    activated.sort((a, b) => b.score - a.score);
    this.lastActivated = activated;
    const signal = this.resolveSignal(activated);
    const confidence = this.computeConfidence(activated);
    return { activated, narrative: this.generateNarrative(activated, features), signal, confidence };
  }

  receiveOutcome(outcome) {
    this.lastActivated.forEach(({ neuron }) => {
      const delta = outcome === 'WIN'
        ? (neuron.isMaster ? 0.25 : 0.03)
        : -0.03;
      neuron.weight = this.clampNeuronWeight(neuron, neuron.weight + delta);
      neuron.correctPredictions += outcome === 'WIN' ? 1 : 0;
      neuron.confidence = neuron.weight;
      this.promoteMasterNeuron(neuron);
    });
  }

  normalizeExportTriggers(triggers = {}) {
    return {
      ...triggers,
      bodyRatio: triggers.bodyRatio ?? null,
      wickUpper: triggers.wickUpper ?? null,
      wickLower: triggers.wickLower ?? null,
      rsiRange: triggers.rsiRange ?? null
    };
  }

  exportElitePatterns() {
    const elite = Array.from(this.neurons.values())
      .filter((neuron) => ['pattern', 'rule'].includes(neuron.type) && neuron.weight > 0.6 && neuron.activations > 20)
      .map((neuron) => ({
        id: neuron.id,
        name: neuron.name,
        type: neuron.type,
        activations: neuron.activations,
        description: neuron.description,
        signal: neuron.signal,
        weight: neuron.weight,
        triggers: this.normalizeExportTriggers(neuron.triggers)
      }));

    return {
      exportedAt: new Date().toISOString(),
      total: elite.length,
      neurons: elite
    };
  }

  exportState() {
    return {
      generation: this.generation,
      observations: this.observations,
      pendingPatterns: this.pendingPatterns,
      totalNeuronsBorn: this.totalNeuronsBorn,
      totalNeuronsDied: this.totalNeuronsDied,
      autoPatternCounter: this.autoPatternCounter,
      testMode: this.testMode,
      maxNeurons: this.maxNeurons,
      neurons: Array.from(this.neurons.values()),
      performanceHistory: this.performanceHistory.slice(-1313)
    };
  }

  importState(state) {
    if (!state) return;
    this.generation = state.generation || 1;
    this.observations = state.observations || 0;
    this.pendingPatterns = state.pendingPatterns || [];
    this.totalNeuronsBorn = state.totalNeuronsBorn || 0;
    this.totalNeuronsDied = state.totalNeuronsDied || 0;
    this.autoPatternCounter = state.autoPatternCounter || 0;
    this.maxNeurons = state.maxNeurons || 1000;
    this.testMode = this.testModes[state.testMode] ? state.testMode : 'discovery';
    this.performanceHistory = (state.performanceHistory || []).slice(-1313);
    this.neurons = new Map((state.neurons || []).map(n => [n.id, { successfulActivations: 0, activationsThreshold: 15, isTesting: false, ...n }]));
    for (const neuron of this.neurons.values()) this.promoteMasterNeuron(neuron);
    if (!this.totalNeuronsBorn) this.totalNeuronsBorn = this.neurons.size;
    this.setTestMode(this.testMode);

  }

  getGraphData() {
    return {
      nodes: Array.from(this.neurons.values()),
      edges: Array.from(this.neurons.values()).flatMap((n) => n.connections.map((conn) => {
        const normalized = this.normalizeConnection(conn);
        return { from: n.id, to: normalized.to, weight: normalized.weight, source: normalized.source };
      }))
    };
  }
}

const brain = new LivingBrain();
const StorageManager = {
  dbName: 'AstrobrainDB',
  storeName: 'brainState',
  key: 'living-brain-state-v2',
  dbPromise: null,
  open() {
    if (this.dbPromise) return this.dbPromise;
    this.dbPromise = new Promise((resolve, reject) => {
      const request = indexedDB.open(this.dbName, 1);
      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains(this.storeName)) db.createObjectStore(this.storeName);
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
    return this.dbPromise;
  },
  async saveState(state) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.storeName, 'readwrite');
      tx.objectStore(this.storeName).put(state, this.key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
      tx.onabort = () => reject(tx.error);
    });
  },
  async loadState() {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.storeName, 'readonly');
      const request = tx.objectStore(this.storeName).get(this.key);
      request.onsuccess = () => resolve(request.result || null);
      request.onerror = () => reject(request.error);
    });
  }
};

function pruneNeuronForStorage(neuron) {
  const {
    recentOutcomes,
    ...rest
  } = neuron;

  return {
    ...rest,
    connections: (neuron.connections || []).slice(0, 25)
  };
}

function buildStorageSnapshot(maxNeurons = Infinity) {
  const base = brain.exportState();
  if (Number.isFinite(maxNeurons) && base.neurons.length > maxNeurons) {
    const ranked = [...base.neurons].sort((a, b) => {
      const scoreA = (a.weight || 0) + ((a.activations || 0) / 100);
      const scoreB = (b.weight || 0) + ((b.activations || 0) / 100);
      return scoreB - scoreA;
    });
    base.neurons = ranked.slice(0, maxNeurons);
  }

  base.pendingPatterns = (base.pendingPatterns || []).slice(-150);
  base.performanceHistory = (base.performanceHistory || []).slice(-1313);
  base.neurons = (base.neurons || []).map(pruneNeuronForStorage);
  return base;
}

async function persistState() {
  try {
    await StorageManager.saveState(buildStorageSnapshot(Infinity));
    return true;
  } catch (err) {
    console.error('No fue posible persistir el estado en IndexedDB.', err);
    addLog('❌ No fue posible persistir el estado en IndexedDB.');
    return false;
  }
}

async function loadState() {
  try {
    return await StorageManager.loadState();
  } catch (err) {
    console.warn('No se pudo leer el estado guardado desde IndexedDB.', err);
    return null;
  }
}

const nodesSim = new Map();
const birthAnimations = [];
const particles = [];
const firingDots = [];
const canvas = document.getElementById('brainCanvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
let hoveredNode = null;

function colorForNeuron(node) {
  if (node?.isNew) return '#22F0FF';
  if (node?.isMaster) return '#FFD84D';
  if (node?.isSuper || node?.isSuperNeuron || node?.type === 'super') return '#B066FF';
  const g = node?.generation || 1;
  return g === 1 ? '#1DB584' : g === 2 ? '#7B6FE8' : '#E8A020';
}
function alpha(hex, a) { const h = hex.replace('#', ''); const n = parseInt(h, 16); return `rgba(${n >> 16}, ${(n >> 8) & 255}, ${n & 255}, ${a})`; }

function syncNodes() {
  const { nodes } = brain.getGraphData();
  const ids = new Set(nodes.map(n => n.id));
  nodes.forEach((n) => {
    if (!nodesSim.has(n.id)) nodesSim.set(n.id, { id: n.id, x: canvas.width / 2, y: canvas.height / 2, vx: 0, vy: 0, pulse: 0 });
  });
  Array.from(nodesSim.keys()).forEach((id) => { if (!ids.has(id)) nodesSim.delete(id); });
}

addEventListener('neuron:born', (e) => {
  syncNodes();
  const n = nodesSim.get(e.detail.id);
  n.x = canvas.width / 2; n.y = canvas.height / 2; n.vx = (Math.random() - 0.5) * 4; n.vy = (Math.random() - 0.5) * 4;
  birthAnimations.push({ id: e.detail.id, start: performance.now() });
  for (let i = 0; i < 8; i++) particles.push({ x: n.x, y: n.y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4, life: 1, color: colorForNeuron(e.detail) });
  saveState();
  renderNeuronsList();
  renderStats();
});

function runPhysics() {
  const arr = Array.from(nodesSim.values());
  for (let i = 0; i < arr.length; i++) {
    for (let j = i + 1; j < arr.length; j++) {
      const a = arr[i], b = arr[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.max(1, Math.hypot(dx, dy));
      const rep = 1200 / (d * d);
      const fx = (dx / d) * rep, fy = (dy / d) * rep;
      a.vx -= fx; a.vy -= fy; b.vx += fx; b.vy += fy;
    }
  }
  brain.getGraphData().edges.forEach((e) => {
    const a = nodesSim.get(e.from), b = nodesSim.get(e.to); if (!a || !b) return;
    const dx = b.x - a.x, dy = b.y - a.y; const d = Math.max(1, Math.hypot(dx, dy));
    const spring = (d - 110) * 0.0018;
    const fx = (dx / d) * spring, fy = (dy / d) * spring;
    a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
  });
  arr.forEach((n) => {
    n.vx += (canvas.width / 2 - n.x) * 0.0006;
    n.vy += (canvas.height / 2 - n.y) * 0.0006;
    n.vx *= 0.85; n.vy *= 0.85;
    n.x += n.vx; n.y += n.vy;
    n.x = Math.max(22, Math.min(canvas.width - 22, n.x));
    n.y = Math.max(22, Math.min(canvas.height - 22, n.y));
  });
}

function drawGraph(now) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const data = brain.getGraphData();
  runPhysics();

  data.edges.forEach((e) => {
    const a = nodesSim.get(e.from), b = nodesSim.get(e.to); if (!a || !b) return;
    const origin = brain.neurons.get(e.from);
    const connFiringColor = getComputedStyle(document.documentElement).getPropertyValue('--conn-firing').trim() || 'rgba(0,229,160,0.7)';
    const isTranscriptHot = e.source === 'transcript' && (origin?.weight ?? 0) > 0.78;
    ctx.strokeStyle = isTranscriptHot ? connFiringColor : 'rgba(255,255,255,0.04)';
    ctx.lineWidth = isTranscriptHot ? 1.4 : 0.5;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  });

  brain.lastActivated.filter(x => x.chained).forEach((a) => {
    firingDots.push({ from: a.from, to: a.to, start: now, dur: 300 });
  });

  for (let i = firingDots.length - 1; i >= 0; i--) {
    const f = firingDots[i]; const a = nodesSim.get(f.from), b = nodesSim.get(f.to);
    if (!a || !b) { firingDots.splice(i, 1); continue; }
    const t = (now - f.start) / f.dur; if (t > 1) { firingDots.splice(i, 1); continue; }
    const x = a.x + (b.x - a.x) * t, y = a.y + (b.y - a.y) * t;
    ctx.fillStyle = 'rgba(0,229,160,0.7)'; ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
  }

  data.nodes.forEach((node) => {
    const sim = nodesSim.get(node.id); if (!sim) return;
    const baseRadius = Math.max(0.5, 8 + (node.weight * 6));
    let radius = baseRadius;
    const color = colorForNeuron(node);
    const b = birthAnimations.find(x => x.id === node.id);
    if (b) {
      const t = (now - b.start) / 500;
      if (t >= 1) birthAnimations.splice(birthAnimations.indexOf(b), 1);
      else radius = t < 0.4 ? 30 * (t / 0.4) : baseRadius + Math.sin(t * 20) * 2;
    }
    const active = brain.lastActivated.find(x => x.neuron.id === node.id);
    if (active) {
      const pulse = Math.sin((now % 400) / 400 * Math.PI);
      radius += pulse * 8;
    }
    const weightAlpha = Math.max(0, Math.min(1, node.weight));
    radius = Math.max(0.5, Number.isFinite(radius) ? radius : baseRadius);
    ctx.globalAlpha = active ? 1 : weightAlpha;
    ctx.shadowBlur = active ? 40 : 12;
    ctx.shadowColor = alpha(color, active ? 0.8 : 0.4);
    ctx.fillStyle = active ? 'rgba(0,229,160,0.7)' : alpha(color, 0.85);
    ctx.strokeStyle = alpha(color, 0.6);
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(sim.x, sim.y, radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.life -= 0.02; p.x += p.vx; p.y += p.vy;
    ctx.fillStyle = alpha(p.color, Math.max(0, p.life));
    ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function frame(ts) { drawGraph(ts); requestAnimationFrame(frame); }

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.floor(canvas.clientWidth * dpr);
  canvas.height = Math.floor(canvas.clientHeight * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  syncNodes();
}
window.addEventListener('resize', resizeCanvas);

async function saveState(reason = 'manual') {
  const persisted = await persistState();
  if (persisted && (reason === 'backtest' || reason === 'prune')) {
    addLog(`💾 Auto-guardado ejecutado tras ${reason === 'backtest' ? 'backtest' : 'poda'}.`);
  }
}

function addLog(text) {
  const log = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
  log.prepend(line);
}

function addLogEntries(lines = []) {
  for (let i = lines.length - 1; i >= 0; i--) addLog(lines[i]);
}

function renderTestMode() {
  const mode = brain.getModeConfig();
  const hint = document.getElementById('testModeHint');
  if (hint) hint.textContent = `Modo actual: ${mode.label} · autoLearn:${mode.autoLearn ? 'ON' : 'OFF'} · entropy:${mode.entropyEnabled ? 'ON' : 'OFF'} · deathThreshold:${mode.deathThreshold}`;
  document.querySelectorAll('[data-phase]').forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.phase === brain.testMode);
  });
}

function renderStats() {
  const health = brain.getHealthSnapshot();
  document.getElementById('statNeurons').textContent = brain.neurons.size;
  document.getElementById('statGen').textContent = brain.generation;
  document.getElementById('statObs').textContent = brain.observations;
  document.getElementById('statHealth').textContent = `${Math.round(brain.getBrainHealthIndex() * 100)}%`;
  document.getElementById('healthAlive').textContent = health.alive;
  document.getElementById('healthAvgWeight').textContent = health.avgWeight.toFixed(3);
  document.getElementById('healthSurvival').textContent = `${Math.round(health.survivalRate)}%`;
  renderTestMode();
}

function renderNeuronsList() {
  const host = document.getElementById('neuronsList');
  const items = Array.from(brain.neurons.values());
  if (!items.length) { host.innerHTML = '<div class="text-sm">El cerebro nace vacío. Aún no hay neuronas.</div>'; return; }
  host.innerHTML = items.map(n => `<div class="neuron-item"><span class="neuron-orb" style="color:${colorForNeuron(n)};background:${colorForNeuron(n)}"></span><div style="flex:1"><div class="text-base">${n.name}</div><div class="text-sm">${n.type} · act:${n.activations} · señal:${n.signal || 'null'}</div><div class="weight-bar"><div class="weight-fill" style="width:${Math.round(n.weight*100)}%"></div></div></div></div>`).join('');
}

let typingToken = 0;
function typeNarrative(text) {
  const history = document.getElementById('narrativeHistory');
  const current = document.getElementById('narrativeText').textContent.trim();
  if (current) history.textContent = current;
  const el = document.getElementById('narrativeText');
  const token = ++typingToken;
  let idx = 0;
  const step = () => {
    if (token !== typingToken) return;
    el.innerHTML = `${text.slice(0, idx)}<span class="narrative-cursor"></span>`;
    idx += 1;
    if (idx <= text.length) setTimeout(step, 18);
  };
  step();
}

function getObserveCandle() {
  return {
    open: Number(document.getElementById('obOpen').value),
    high: Number(document.getElementById('obHigh').value),
    low: Number(document.getElementById('obLow').value),
    close: Number(document.getElementById('obClose').value),
    volume: Number(document.getElementById('obVolume').value),
    rsi: Number(document.getElementById('obRsi').value),
    session: document.getElementById('obSession').value,
    trend: document.getElementById('obTrend').value
  };
}

function updateSignal(signal, confidence) {
  const badge = document.getElementById('signalBadge');
  badge.className = `signal-badge ${signal.toLowerCase()}`;
  document.getElementById('signalText').textContent = `${signal} · ${Math.round(confidence * 100)}%`;
  document.getElementById('confidenceFill').style.width = `${Math.round(confidence * 100)}%`;
}

document.getElementById('btnTranscript').onclick = () => {
  const text = document.getElementById('transcript').value;
  const created = brain.learnFromTranscript(text);
  addLog(`Transcripción procesada. Neuronas concepto creadas: ${created}.`);
  renderStats(); renderNeuronsList(); saveState();
};

document.getElementById('btnRule').onclick = () => {
  const t = document.getElementById('ruleInput').value.trim();
  if (!t) return addLog('Regla vacía, no se creó neurona.');
  brain.learnFromRule(t);
  addLog(`Regla aprendida: ${t}`);
  renderStats(); renderNeuronsList(); saveState();
};

document.getElementById('btnCandle').onclick = () => {
  const fd = new FormData(document.getElementById('trainForm'));
  const c = Object.fromEntries(fd.entries());
  ['open', 'high', 'low', 'close', 'rsi'].forEach(k => c[k] = Number(c[k]));
  const res = brain.learnFromCandle(c, c.outcome);
  addLog(`Vela histórica aprendida (${c.outcome}). Resultado: ${JSON.stringify(res)}.`);
  renderStats(); renderNeuronsList(); saveState();
};

async function runPhase(phase) {
  const selectedPhase = ['discovery', 'validation', 'selection'].includes(phase) ? phase : 'discovery';
  const file = document.getElementById('dataFile').files[0];

  if (!file) {
    const message = 'Selecciona un archivo CSV o JSON antes de correr backtest.';
    alert(message);
    addLog(message);
    return;
  }

  if (selectedPhase === 'discovery' && brain.neurons.size >= brain.maxNeurons) {
    const warning = '⚠️ Capacidad máxima alcanzada. Por favor, ejecuta Fase 2 o 3 para optimizar el cerebro.';
    alert(warning);
    addLog(warning);
    return;
  }

  brain.setTestMode(selectedPhase);
  if (selectedPhase === 'validation') {
    brain.resetPerformance();
    addLog('🧪 Fase 2 activada: creación bloqueada y métricas WIN/LOSS reiniciadas.');
  } else if (selectedPhase === 'selection') {
    addLog('⚔️ Fase 3 activada: selección radical habilitada (umbral de muerte 0.45).');
  } else {
    addLog('▶ Fase 1 activada: aprendizaje automático habilitado, poda desactivada.');
  }
  renderTestMode();

  try {
    const raw = await file.text();
    const candles = brain.parseMarketData(raw, file.name.split('.').pop() || 'json');
    if (!Array.isArray(candles) || !candles.length) {
      const message = 'No se pudieron generar velas válidas desde el archivo. Revisa formato de columnas y precios.';
      alert(message);
      addLog(message);
      return;
    }

    if (candles.length < 2) {
      const message = 'Se necesitan al menos 2 velas válidas para ejecutar el backtest.';
      alert(message);
      addLog(message);
      return;
    }

    const result = await brain.runBacktest(candles);
    addLog(`Backtest finalizado en ${result.candlesProcessed} velas. Activaciones:${result.activations} WIN:${result.wins} LOSS:${result.losses}.`);
    if (selectedPhase === 'selection') {
      const merged = brain.mergeAndGold();
      if (merged.fusionSummary?.created || merged.pruneSummary?.removed) {
        addLog(`🥇 mergeAndGold ejecutado: fusionadas ${merged.fusionSummary?.created || 0}, podadas ${merged.pruneSummary?.removed || 0}.`);
      }
    }
    addLogEntries(result.report?.lines || []);
    renderStats();
    renderNeuronsList();
    await saveState('mode');
  } catch (error) {
    const message = `Error procesando archivo: ${error.message}`;
    alert(message);
    addLog(message);
  }
}

document.getElementById('btnObserve').onclick = () => {
  const res = brain.observeCandle(getObserveCandle());
  typeNarrative(res.narrative);
  updateSignal(res.signal, res.confidence);
  addLog(`Observación -> señal ${res.signal} (${Math.round(res.confidence * 100)}%).`);
  renderStats(); renderNeuronsList(); saveState();
};

document.getElementById('btnWin').onclick = () => { brain.receiveOutcome('WIN'); addLog('Feedback WIN recibido. Pesos reforzados.'); renderNeuronsList(); saveState(); };
document.getElementById('btnLoss').onclick = () => { brain.receiveOutcome('LOSS'); addLog('Feedback LOSS recibido. Pesos reducidos.'); renderNeuronsList(); saveState(); };
document.getElementById('btnEvolve').onclick = () => { const d = brain.evolveNeurons(); addLog(`Evolución ejecutada. Hijas creadas: ${d.length}.`); renderStats(); renderNeuronsList(); saveState(); };
document.getElementById('btnSurvivalReport').onclick = () => {
  const report = brain.generateSurvivalReport();
  addLogEntries(report.lines);
};

document.getElementById('btnPruneNoise').onclick = () => {
  const removed = brain.pruneNoise();
  addLog(`Poda completada: Se eliminaron ${removed} neuronas de bajo rendimiento. Salud del sistema optimizada.`);
  syncNodes();
  renderNeuronsList();
  renderStats();
  saveState('prune');
};

const handleExportPro = async () => {
  const payload = brain.exportElitePatterns();
  const json = JSON.stringify(payload, null, 2);
  const output = document.getElementById('exportOutput');
  if (output) output.value = json;

  let copied = false;
  if (navigator.clipboard?.writeText) {
    try {
      await navigator.clipboard.writeText(json);
      copied = true;
    } catch (error) {
      copied = false;
    }
  }

  const baseMessage = `Exportación completada. Neuronas elite encontradas: ${payload.total}.`;
  alert(copied ? `${baseMessage} JSON copiado al portapapeles.` : `${baseMessage} Copia manual desde el textarea.`);
  addLog(copied
    ? `Exportación Pro lista (${payload.total} neuronas). JSON copiado al portapapeles.`
    : `Exportación Pro lista (${payload.total} neuronas). Copia manual requerida.`);
};

document.getElementById('btnExportPro').onclick = handleExportPro;
document.getElementById('btnExportProPanel').onclick = handleExportPro;


addEventListener('backtest:tick', (event) => {
  const { index, total, wins, losses, active } = event.detail;
  typeNarrative(`Backtest ${index}/${total}. Activadas: ${active}. WIN ${wins} · LOSS ${losses}.`);
  renderStats();
  renderNeuronsList();
});

document.getElementById('phaseTriggers').onclick = async (e) => {
  const btn = e.target.closest('[data-phase]');
  if (!btn) return;
  await runPhase(btn.dataset.phase);
};

document.getElementById('tabs').onclick = (e) => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${btn.dataset.tab}`).classList.add('active');
};

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  hoveredNode = null;
  for (const node of brain.neurons.values()) {
    const sim = nodesSim.get(node.id); if (!sim) continue;
    const r = 8 + node.weight * 6;
    if (Math.hypot(sim.x - x, sim.y - y) <= r + 5) { hoveredNode = { node, x: sim.x, y: sim.y }; break; }
  }
  if (hoveredNode) {
    tooltip.style.opacity = 1;
    tooltip.style.left = `${hoveredNode.x}px`;
    tooltip.style.top = `${hoveredNode.y}px`;
    tooltip.innerHTML = `<div>${hoveredNode.node.name}</div><div>Gen ${hoveredNode.node.generation} · act ${hoveredNode.node.activations}</div><div class="weight-mini"><span style="width:${hoveredNode.node.weight * 100}%"></span></div>`;
  } else tooltip.style.opacity = 0;
});

async function initializeApp() {
  brain.importState(await loadState());
  resizeCanvas();
  syncNodes();
  renderStats();
  renderNeuronsList();
  addLog('Living Brain inicializado. Estado cargado desde IndexedDB.');
  addLog(`Modo inicial: ${brain.getModeConfig().label}.`);
  requestAnimationFrame(frame);
}

initializeApp();
</script>
